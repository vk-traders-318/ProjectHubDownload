<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #f4f4f4;
        }
        .download-btn {
            padding: 15px 25px;
            font-size: 18px;
            background: #28a745;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: 0.3s;
        }
        .download-btn:hover {
            background: #218838;
        }
    </style>
</head>
<body>

<a href="app.apk" class="download-btn" download>
    Download App
</a>

</body>
</html>
